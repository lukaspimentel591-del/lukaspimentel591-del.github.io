<!DOCTYPE html>
<html>
<head>
    <title>Jogo de Tiro 🔫</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        #player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: blue;
            bottom: 10px;
            left: 50%;
        }

        .bullet {
            position: absolute;
            width: 5px;
            height: 10px;
            background: yellow;
        }

        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background: red;
            top: 0;
        }
    </style>
</head>
<body>

<div id="player"></div>

<script>
let player = document.getElementById("player");
let bullets = [];
let enemies = [];
let playerX = window.innerWidth / 2;

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") playerX -= 20;
    if (e.key === "ArrowRight") playerX += 20;

    if (e.key === " ") shoot();

    player.style.left = playerX + "px";
});

function shoot() {
    let bullet = document.createElement("div");
    bullet.classList.add("bullet");
    bullet.style.left = playerX + 20 + "px";
    bullet.style.top = window.innerHeight - 60 + "px";

    document.body.appendChild(bullet);
    bullets.push(bullet);
}

function spawnEnemy() {
    let enemy = document.createElement("div");
    enemy.classList.add("enemy");
    enemy.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(enemy);
    enemies.push(enemy);
}

setInterval(spawnEnemy, 1000);

function gameLoop() {
    bullets.forEach((b, i) => {
        b.style.top = b.offsetTop - 10 + "px";

        enemies.forEach((e, j) => {
            if (
                b.offsetTop < e.offsetTop + 40 &&
                b.offsetLeft > e.offsetLeft &&
                b.offsetLeft < e.offsetLeft + 40
            ) {
                b.remove();
                e.remove();
                bullets.splice(i, 1);
                enemies.splice(j, 1);
            }
        });

        if (b.offsetTop < 0) {
            b.remove();
            bullets.splice(i, 1);
        }
    });

    enemies.forEach((e, i) => {
        e.style.top = e.offsetTop + 3 + "px";

        if (e.offsetTop > window.innerHeight) {
            e.remove();
            enemies.splice(i, 1);
        }
    });

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
