<!DOCTYPE html>
<html>
<head>
<title>FPS Realista</title>
<style>
html, body { width:100%; height:100%; margin:0; overflow:hidden; }
#renderCanvas { width:100%; height:100%; touch-action:none; }
#shoot { position:fixed; bottom:20px; right:20px; background:red; padding:20px; color:white; border-radius:50%; }
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>
<div id="shoot">🔫</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = () => {
    const scene = new BABYLON.Scene(engine);

    // câmera FPS
    const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0,2,-10), scene);
    camera.attachControl(canvas, true);

    // luz
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(1,1,0), scene);

    // chão
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:100, height:100}, scene);

    // inimigo
    let enemy = BABYLON.MeshBuilder.CreateBox("enemy", {}, scene);
    enemy.position.z = 10;

    // tiro
    document.getElementById("shoot").onclick = () => {
        if (BABYLON.Vector3.Distance(camera.position, enemy.position) < 15) {
            enemy.position.z = 20;
        }
    };

    scene.onBeforeRenderObservable.add(() => {
        enemy.position.z -= 0.05;
    });

    return scene;
};

const scene = createScene();

engine.runRenderLoop(() => {
    scene.render();
});

window.addEventListener("resize", () => {
    engine.resize();
});
</script>

</body>
</html>
