<!DOCTYPE html>
<html>
<head>
    <title>FPS 3D 🔫</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 15px;
            background: red;
            color: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="btn">ATIRAR 🔫</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// chão
let floorGeo = new THREE.PlaneGeometry(50, 50);
let floorMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
let floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// inimigo
let enemyGeo = new THREE.BoxGeometry();
let enemyMat = new THREE.MeshBasicMaterial({color: 0xff0000});
let enemy = new THREE.Mesh(enemyGeo, enemyMat);
enemy.position.z = -5;
scene.add(enemy);

camera.position.y = 2;

// botão tiro (funciona no iPhone)
document.getElementById("btn").onclick = () => {
    if (enemy.position.z < -1) {
        enemy.position.z += 1;
    } else {
        enemy.position.z = -10;
    }
};

// movimento com toque
document.addEventListener("touchmove", (e) => {
    camera.rotation.y -= e.touches[0].movementX * 0.002;
});

// loop
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
